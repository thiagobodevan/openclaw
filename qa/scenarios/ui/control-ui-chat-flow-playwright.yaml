title: Control UI chat flow Playwright coverage

scenario:
  id: control-ui-chat-flow-playwright
  surface: control-ui
  coverage:
    primary:
      - ui.control
  objective: Smoke-test a Control UI chat turn through the hosted browser surface.
  successCriteria:
    - Playwright sends a chat turn and renders the final Gateway event.
  docsRefs:
    - docs/web/control-ui.md
  codeRefs:
    - ui/src/e2e/chat-flow.e2e.test.ts
  execution:
    kind: playwright
    path: ui/src/e2e/chat-flow.e2e.test.ts
    testNamePattern: sends a chat turn through the GUI and renders the final Gateway event
    summary: Focused Playwright smoke coverage for the Control UI chat flow.
