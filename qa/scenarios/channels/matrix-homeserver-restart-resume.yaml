title: Matrix lane resumes after homeserver restart
scenario:
  id: matrix-homeserver-restart-resume
  surface: channels
  coverage:
    primary:
      - channels.reconnect
  objective: "Preserve the retired qa-matrix behavior: Matrix lane resumes after homeserver restart."
  successCriteria:
    - The QA Lab flow completes matrix-homeserver-restart-resume through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix lane resumes after homeserver restart
    timeoutMs: 75000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: homeserver
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Homeserver Restart Room
            requireMention: true

flow:
  steps:
    - name: Matrix lane resumes after homeserver restart
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runHomeserverRestartResumeScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
