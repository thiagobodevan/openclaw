title: Matrix metadata-only mention spoof does not trigger
scenario:
  id: matrix-mention-metadata-spoof-block
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 8000
    retryCount: 0
    config:
      requiredChannelDriver: live

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-policy.js
  call: runMentionMetadataSpoofBlockScenario
  args:
    - expr: "scenarioContext"
