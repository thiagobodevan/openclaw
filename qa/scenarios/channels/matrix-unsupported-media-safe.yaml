title: Matrix unsupported media safety
scenario:
  id: matrix-unsupported-media-safe
  surface: channels
  coverage:
    primary:
      - channels.attachments
    secondary:
      - runtime.delivery
  objective: Verify an unsupported Matrix file does not prevent a captioned text reply.
  successCriteria:
    - The adapter uploads an unsupported binary file with a mentioned prompt.
    - The agent safely returns the exact marker.
  docsRefs:
    - docs/channels/matrix.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/adapter.runtime.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix unsupported media attachments do not block caption replies
    timeoutMs: 45000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: media
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Media Room
            requireMention: true

flow:
  steps:
    - name: Matrix unsupported media safety
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runUnsupportedMediaSafeScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
