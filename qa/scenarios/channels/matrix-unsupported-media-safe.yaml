title: Matrix unsupported media safety

scenario:
  id: matrix-unsupported-media-safe
  surface: channels
  coverage:
    primary:
      - channels.attachments
    secondary:
      - runtime.delivery
  objective: Verify an unsupported Matrix file does not prevent a captioned text reply.
  successCriteria:
    - The adapter uploads an unsupported binary file with a mentioned prompt.
    - The agent safely returns the exact marker.
  docsRefs:
    - docs/channels/matrix.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/adapter.runtime.ts
  execution:
    kind: flow
    channel: matrix
    suiteIsolation: isolated
    config:
      requiredChannelDriver: live
      marker: MATRIX-QA-UNSUPPORTED-MEDIA-SAFE

flow:
  steps:
    - name: preserves caption handling for unsupported media
      actions:
        - resetTransport: true
        - sendInbound:
            conversation: { id: main, kind: group }
            senderId: driver
            senderName: QA Driver
            text:
              expr: "`@openclaw Ignore the unsupported attachment and reply exactly: ${config.marker}`"
            attachments:
              - id: matrix-unsupported-file
                kind: file
                mimeType: application/x-openclaw-unsupported
                fileName: unsupported.openclaw
                contentBase64: AAEC
        - waitForOutbound:
            conversation: { id: main, kind: group }
            textIncludes: { ref: config.marker }
            timeoutMs:
              expr: liveTurnTimeoutMs(env, 60000)
          saveAs: outbound
      detailsExpr: outbound.text
