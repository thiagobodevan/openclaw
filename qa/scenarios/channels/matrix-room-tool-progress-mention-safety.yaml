title: Matrix streaming keeps tool-progress mentions inert
scenario:
  id: matrix-room-tool-progress-mention-safety
  surface: channels
  coverage:
    primary:
      - channels.streaming
  objective: "Preserve the retired qa-matrix behavior: Matrix streaming keeps tool-progress mentions inert."
  successCriteria:
    - The QA Lab flow completes matrix-room-tool-progress-mention-safety through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix streaming keeps tool-progress mentions inert
    timeoutMs: 60000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        streaming: partial
        toolProfile: coding

flow:
  steps:
    - name: Matrix streaming keeps tool-progress mentions inert
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runToolProgressMentionSafetyScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
