title: Matrix allowBots=true accepts unmentioned configured bot messages in open rooms
scenario:
  id: matrix-allowbots-true-unmentioned-open-room
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  objective: "Preserve the retired qa-matrix behavior: Matrix allowBots=true accepts unmentioned
    configured bot messages in open rooms."
  successCriteria:
    - The QA Lab Matrix adapter completes matrix-allowbots-true-unmentioned-open-room with the
      original Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-live-matrix.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/scenario-runtime.ts
  execution:
    kind: transport
    channel: matrix
    summary: Matrix allowBots=true accepts unmentioned configured bot messages in open rooms
    timeoutMs: 45000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        allowBots: true
        configuredBotRoles:
          - observer
        groupAllowRoles:
          - driver
          - observer
        groupsByKey:
          main:
            requireMention: false

