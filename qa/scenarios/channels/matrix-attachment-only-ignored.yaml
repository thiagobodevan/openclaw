title: Matrix attachment-only mention gating
scenario:
  id: matrix-attachment-only-ignored
  surface: channels
  coverage:
    primary:
      - channels.mention-gating
    secondary:
      - channels.attachments
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 8000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: media
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Media Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-media.js
  call: runAttachmentOnlyIgnoredScenario
  args:
    - expr: "scenarioContext"
