title: Matrix room membership loss recovers after re-invite
scenario:
  id: matrix-room-membership-loss
  surface: channels
  coverage:
    primary:
      - channels.reconnect
  objective: "Preserve the retired qa-matrix behavior: Matrix room membership loss recovers after re-invite."
  successCriteria:
    - The QA Lab flow completes matrix-room-membership-loss through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix room membership loss recovers after re-invite
    timeoutMs: 75000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: membership
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Membership Room
            requireMention: true

flow:
  steps:
    - name: Matrix room membership loss recovers after re-invite
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runMembershipLossScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
