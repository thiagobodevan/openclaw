  surface: channels
  coverage:
    primary:
      - channels.reconnect
  objective: "Preserve the retired qa-matrix behavior: Matrix stale sync replay is absorbed by inbound
    dedupe."
  successCriteria:
    - The QA Lab Matrix adapter completes matrix-stale-sync-replay-dedupe with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-live-matrix.md
  codeRefs:
