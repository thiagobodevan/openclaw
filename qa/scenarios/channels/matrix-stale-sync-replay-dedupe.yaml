  execution:
    kind: transport
    channel: matrix
    summary: Matrix stale sync replay is absorbed by inbound dedupe
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: stale-sync
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Stale Sync Room
            requireMention: true

