title: Matrix stale sync replay is absorbed by inbound dedupe
scenario:
  id: matrix-stale-sync-replay-dedupe
  surface: channels
  coverage:
    primary:
      - channels.reconnect
  objective:
    "Preserve the retired qa-matrix behavior: Matrix stale sync replay is absorbed by inbound
    dedupe."
  successCriteria:
    - The QA Lab flow completes matrix-stale-sync-replay-dedupe through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix stale sync replay is absorbed by inbound dedupe
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: stale-sync
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Stale Sync Room
            requireMention: true

flow:
  steps:
    - name: Matrix stale sync replay is absorbed by inbound dedupe
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runStaleSyncReplayDedupeScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
