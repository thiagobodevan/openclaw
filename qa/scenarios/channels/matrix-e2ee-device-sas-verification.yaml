title: Matrix E2EE device verification completes SAS emoji compare
scenario:
  id: matrix-e2ee-device-sas-verification
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-device-sas-verification
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Device SAS Verification Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee.js
  call: runMatrixQaE2eeDeviceSasVerificationScenario
  args:
    - expr: "scenarioContext"
