title: Matrix allowBots default blocks configured bot senders
scenario:
  id: matrix-allowbots-default-block
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  objective:
    "Preserve the retired qa-matrix behavior: Matrix allowBots default blocks configured bot
    senders."
  successCriteria:
    - The QA Lab flow completes matrix-allowbots-default-block through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix allowBots default blocks configured bot senders
    timeoutMs: 8000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        configuredBotRoles:
          - observer
        groupAllowRoles:
          - driver
          - observer

flow:
  steps:
    - name: Matrix allowBots default blocks configured bot senders
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runAllowBotsDefaultBlockScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
