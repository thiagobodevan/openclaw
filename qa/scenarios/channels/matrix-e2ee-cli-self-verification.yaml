title: Matrix E2EE CLI interactive self-verification establishes identity trust
scenario:
  id: matrix-e2ee-cli-self-verification
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 180000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-cli-self-verification
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE CLI Self Verification Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee.js
  call: runMatrixQaE2eeCliSelfVerificationScenario
  args:
    - expr: "scenarioContext"
