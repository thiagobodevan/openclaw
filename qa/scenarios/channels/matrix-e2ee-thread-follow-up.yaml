title: Matrix E2EE encrypted threads preserve reply shape
scenario:
  id: matrix-e2ee-thread-follow-up
  surface: channels
  coverage:
    primary:
      - channels.threads
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 75000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-thread-follow-up
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Thread Follow-up Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee.js
  call: runMatrixQaE2eeThreadFollowUpScenario
  args:
    - expr: "scenarioContext"
