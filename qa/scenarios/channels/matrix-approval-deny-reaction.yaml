title: Matrix approval deny reaction resolves the metadata-bearing event
scenario:
  id: matrix-approval-deny-reaction
  surface: channels
  coverage:
    primary:
      - channels.native-approval-prompts
  objective: "Preserve the retired qa-matrix behavior: Matrix approval deny reaction resolves the
    metadata-bearing event."
  successCriteria:
    - The QA Lab flow completes matrix-approval-deny-reaction through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix approval deny reaction resolves the metadata-bearing event
    timeoutMs: 75000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        approvalForwarding:
          exec: true
        dm:
          enabled: true
        execApprovals:
          enabled: true
          target: channel

flow:
  steps:
    - name: Matrix approval deny reaction resolves the metadata-bearing event
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runApprovalDenyReactionScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
