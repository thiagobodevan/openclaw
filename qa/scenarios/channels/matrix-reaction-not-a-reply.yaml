title: Matrix reactions do not trigger a fresh bot reply
scenario:
  id: matrix-reaction-not-a-reply
  surface: channels
  coverage:
    primary:
      - channels.message-actions
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 8000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixRequireCanary: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-reaction.js
  call: runReactionNotAReplyScenario
  args:
    - expr: "scenarioContext"
