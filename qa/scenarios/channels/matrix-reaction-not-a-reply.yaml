title: Matrix reactions do not trigger a fresh bot reply
scenario:
  id: matrix-reaction-not-a-reply
  surface: channels
  coverage:
    primary:
      - channels.message-actions
  objective: "Preserve the retired qa-matrix behavior: Matrix reactions do not trigger a fresh bot reply."
  successCriteria:
    - The QA Lab flow completes matrix-reaction-not-a-reply through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix reactions do not trigger a fresh bot reply
    timeoutMs: 8000
    retryCount: 0
    config:
      requiredChannelDriver: live

flow:
  steps:
    - name: Matrix reactions do not trigger a fresh bot reply
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runReactionNotAReplyScenario
          args:
            - expr: "await transport.fixtureApi.getContext({ requireCanary: true })"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
