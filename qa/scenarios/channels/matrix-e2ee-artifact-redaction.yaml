title: Matrix E2EE decrypted payloads stay out of default event artifacts
scenario:
  id: matrix-e2ee-artifact-redaction
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  objective: "Preserve the retired qa-matrix behavior: Matrix E2EE decrypted payloads stay out of
    default event artifacts."
  successCriteria:
    - The QA Lab Matrix adapter completes matrix-e2ee-artifact-redaction with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-live-matrix.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/scenario-runtime.ts
  execution:
    kind: transport
    channel: matrix
    summary: Matrix E2EE decrypted payloads stay out of default event artifacts
    timeoutMs: 150000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-artifact-redaction
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Artifact Redaction Room
            requireMention: true

