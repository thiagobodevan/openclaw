title: Matrix quiet streaming preview

scenario:
  id: matrix-room-quiet-streaming-preview
  surface: channels
  coverage:
    primary:
      - channels.streaming
  objective: Verify Matrix quiet streaming emits a preview that settles into one final answer.
  gatewayConfigPatch:
    channels:
      matrix:
        accounts:
          $selectedAccount:
            streaming: quiet
  successCriteria:
    - Matrix emits at least one quiet preview event.
    - The preview sequence settles on the exact final marker.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/streaming.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/adapter.runtime.ts
  execution:
    kind: flow
    channel: matrix
    suiteIsolation: isolated
    config:
      requiredChannelDriver: live
      requiredProviderMode: mock-openai
      marker: MATRIX-QA-QUIET-STREAM-FINAL

flow:
  steps:
    - name: replaces quiet previews with the final marker
      actions:
        - assert:
            expr: env.providerMode === config.requiredProviderMode
            message: deterministic Matrix streaming proof requires mock-openai
        - resetTransport: true
        - sendInbound:
            conversation: { id: main, kind: group }
            senderId: driver
            senderName: QA Driver
            text:
              expr: "`@openclaw Final-only marker streaming QA check. Reply exactly: ${config.marker}`"
        - waitForOutboundSequence:
            conversationId: main
            finalTextIncludes: { ref: config.marker }
            finalSettleMs: 500
            minimumPreviewEvents: 1
            timeoutMs:
              expr: liveTurnTimeoutMs(env, 60000)
          saveAs: sequence
        - assert:
            expr: sequence.events.length >= 2
            message:
              expr: "`expected Matrix preview and final events, got ${JSON.stringify(sequence.events)}`"
      detailsExpr: "`${sequence.events.map((event) => event.kind).join(' -> ')}: ${sequence.final.text}`"
