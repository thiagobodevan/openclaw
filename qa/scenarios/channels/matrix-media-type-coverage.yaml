title: Matrix media attachments cover image, audio, video, PDF, and EPUB transport
scenario:
  id: matrix-media-type-coverage
  surface: channels
  coverage:
    primary:
      - channels.media-rich-content
  objective: "Preserve the retired qa-matrix behavior: Matrix media attachments cover image, audio,
    video, PDF, and EPUB transport."
  successCriteria:
    - The QA Lab flow completes matrix-media-type-coverage through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix media attachments cover image, audio, video, PDF, and EPUB transport
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: media
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Media Room
            requireMention: true

flow:
  steps:
    - name: Matrix media attachments cover image, audio, video, PDF, and EPUB transport
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runMediaTypeCoverageScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
