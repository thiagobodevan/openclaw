title: Matrix E2EE bootstrap reports room-key backup failures
scenario:
  id: matrix-e2ee-key-bootstrap-failure
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-key-bootstrap-failure
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Key Bootstrap Failure Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee.js
  call: runMatrixQaE2eeKeyBootstrapFailureScenario
  args:
    - expr: "scenarioContext"
