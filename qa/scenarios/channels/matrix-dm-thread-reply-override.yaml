title: Matrix DM thread reply override
scenario:
  id: matrix-dm-thread-reply-override
  surface: channels
  coverage:
    primary:
      - channels.threads
    secondary:
      - channels.direct-messages
  objective: Verify the Matrix DM thread override converts a top-level DM into a threaded reply.
  successCriteria:
    - A top-level DM receives the exact marker.
    - The outbound message uses the inbound DM event as its normalized thread root.
  docsRefs:
    - docs/channels/matrix.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/adapter.runtime.ts
    - extensions/matrix/src/matrix/monitor/threads.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix DM thread override keeps DM replies threaded
    timeoutMs: 45000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        dm:
          threadReplies: always
        threadReplies: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - key: driver-dm
            kind: dm
            members:
              - driver
              - sut
            name: Matrix QA Driver/SUT DM

flow:
  steps:
    - name: Matrix DM thread reply override
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runDmThreadReplyOverrideScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
