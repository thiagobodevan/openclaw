title: Matrix E2EE recovery key restores and resets room-key backup
scenario:
  id: matrix-e2ee-recovery-key-lifecycle
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-recovery-key-lifecycle
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Recovery Key Lifecycle Room
            requireMention: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-e2ee.js
  call: runMatrixQaE2eeRecoveryKeyLifecycleScenario
  args:
    - expr: "scenarioContext"
