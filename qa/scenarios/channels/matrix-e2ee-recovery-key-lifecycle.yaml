title: Matrix E2EE recovery key restores and resets room-key backup
scenario:
  id: matrix-e2ee-recovery-key-lifecycle
  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  objective: "Preserve the retired qa-matrix behavior: Matrix E2EE recovery key restores and resets
    room-key backup."
  successCriteria:
    - The QA Lab flow completes matrix-e2ee-recovery-key-lifecycle through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix E2EE recovery key restores and resets room-key backup
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-recovery-key-lifecycle
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Recovery Key Lifecycle Room
            requireMention: true

flow:
  steps:
    - name: Matrix E2EE recovery key restores and resets room-key backup
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runMatrixQaE2eeRecoveryKeyLifecycleScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
