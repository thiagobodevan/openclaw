title: Matrix plugin approval prompt carries plugin metadata
scenario:
  id: matrix-approval-plugin-metadata-single-event
  surface: channels
  coverage:
    primary:
      - channels.native-approval-prompts
  objective: "Preserve the retired qa-matrix behavior: Matrix plugin approval prompt carries plugin metadata."
  successCriteria:
    - The QA Lab flow completes matrix-approval-plugin-metadata-single-event through the Matrix adapter with the
      original Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix plugin approval prompt carries plugin metadata
    timeoutMs: 75000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        approvalForwarding:
          plugin: true
        dm:
          enabled: true
        execApprovals:
          enabled: true
          target: channel

flow:
  steps:
    - name: Matrix plugin approval prompt carries plugin metadata
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runApprovalPluginMetadataSingleEventScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
