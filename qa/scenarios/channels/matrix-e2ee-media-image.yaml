title: Matrix E2EE encrypted image attachments reach the model vision path
scenario:
  id: matrix-e2ee-media-image
  surface: channels
  coverage:
    primary:
      - channels.media-rich-content
  objective: "Preserve the retired qa-matrix behavior: Matrix E2EE encrypted image attachments reach
    the model vision path."
  successCriteria:
    - The QA Lab flow completes matrix-e2ee-media-image through the Matrix adapter with the original Matrix-specific
      assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix E2EE encrypted image attachments reach the model vision path
    timeoutMs: 180000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-media-image
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Media Image Room
            requireMention: true

flow:
  steps:
    - name: Matrix E2EE encrypted image attachments reach the model vision path
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runMatrixQaE2eeMediaImageScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
