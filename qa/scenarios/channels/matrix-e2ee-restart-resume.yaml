title: Matrix E2EE encrypted rooms resume after gateway restart
scenario:
  id: matrix-e2ee-restart-resume
  surface: channels
  coverage:
    primary:
      - channels.reconnect
  objective: "Preserve the retired qa-matrix behavior: Matrix E2EE encrypted rooms resume after
    gateway restart."
  successCriteria:
    - The QA Lab Matrix adapter completes matrix-e2ee-restart-resume with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-live-matrix.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/scenario-runtime.ts
  execution:
    kind: transport
    channel: matrix
    summary: Matrix E2EE encrypted rooms resume after gateway restart
    timeoutMs: 150000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-restart-resume
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Restart Resume Room
            requireMention: true

