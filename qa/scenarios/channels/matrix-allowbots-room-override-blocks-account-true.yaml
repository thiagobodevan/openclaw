title: Matrix room allowBots=false overrides account allowBots=true
scenario:
  id: matrix-allowbots-room-override-blocks-account-true
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  objective: "Preserve the retired qa-matrix behavior: Matrix room allowBots=false overrides account
    allowBots=true."
  successCriteria:
    - The QA Lab flow completes matrix-allowbots-room-override-blocks-account-true through the Matrix adapter with
      the original Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix room allowBots=false overrides account allowBots=true
    timeoutMs: 8000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        allowBots: true
        configuredBotRoles:
          - observer
        groupAllowRoles:
          - driver
          - observer
        groupsByKey:
          main:
            allowBots: false
            requireMention: false

flow:
  steps:
    - name: Matrix room allowBots=false overrides account allowBots=true
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runAllowBotsRoomOverrideBlocksAccountTrueScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
