title: Matrix reactions preserve threaded reply targets
scenario:
  id: matrix-reaction-threaded
  surface: channels
  coverage:
    primary:
      - channels.message-actions
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 45000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixRequireCanary: true

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-room.js
  call: runReactionThreadedScenario
  args:
    - expr: "scenarioContext"
