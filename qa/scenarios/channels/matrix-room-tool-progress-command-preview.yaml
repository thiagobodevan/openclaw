title: Matrix streaming replaces command progress lines inside the preview message
scenario:
  id: matrix-room-tool-progress-command-preview
  surface: channels
  coverage:
    primary:
      - channels.streaming
  objective: "Preserve the retired qa-matrix behavior: Matrix streaming replaces command progress
    lines inside the preview message."
  successCriteria:
    - The QA Lab flow completes matrix-room-tool-progress-command-preview through the Matrix adapter with the
      original Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix streaming replaces command progress lines inside the preview message
    timeoutMs: 60000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        streaming: quiet
        toolProfile: coding

flow:
  steps:
    - name: Matrix streaming replaces command progress lines inside the preview message
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runToolProgressCommandPreviewScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
