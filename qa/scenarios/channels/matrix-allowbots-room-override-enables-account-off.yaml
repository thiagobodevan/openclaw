title: Matrix room allowBots=mentions overrides account allowBots off
scenario:
  id: matrix-allowbots-room-override-enables-account-off
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  objective: "Preserve the retired qa-matrix behavior: Matrix room allowBots=mentions overrides
    account allowBots off."
  successCriteria:
    - The QA Lab flow completes matrix-allowbots-room-override-enables-account-off through the Matrix adapter with
      the original Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix room allowBots=mentions overrides account allowBots off
    timeoutMs: 45000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        configuredBotRoles:
          - observer
        groupAllowRoles:
          - driver
          - observer
        groupsByKey:
          main:
            allowBots: mentions
            requireMention: true

flow:
  steps:
    - name: Matrix room allowBots=mentions overrides account allowBots off
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runAllowBotsRoomOverrideEnablesAccountOffScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
