title: Matrix allowBots=mentions blocks unmentioned configured bot messages in open rooms
scenario:
  id: matrix-allowbots-mentions-unmentioned-open-room-block
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  objective: "Preserve the retired qa-matrix behavior: Matrix allowBots=mentions blocks unmentioned
    configured bot messages in open rooms."
  successCriteria:
    - The QA Lab flow completes matrix-allowbots-mentions-unmentioned-open-room-block through the Matrix adapter with
      the original Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix allowBots=mentions blocks unmentioned configured bot messages in open rooms
    timeoutMs: 8000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        allowBots: mentions
        configuredBotRoles:
          - observer
        groupAllowRoles:
          - driver
          - observer
        groupsByKey:
          main:
            requireMention: false

flow:
  steps:
    - name: Matrix allowBots=mentions blocks unmentioned configured bot messages in open rooms
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runAllowBotsMentionsUnmentionedOpenRoomBlockScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
