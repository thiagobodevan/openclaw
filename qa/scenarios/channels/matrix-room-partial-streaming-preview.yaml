title: Matrix partial streaming preview
scenario:
  id: matrix-room-partial-streaming-preview
  surface: channels
  coverage:
    primary:
      - channels.streaming
  objective: Verify Matrix partial streaming emits previews that settle into one final answer.
  successCriteria:
    - Matrix emits at least one preview event.
    - The preview sequence settles on the exact final marker.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/streaming.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/adapter.runtime.ts
  execution:
    kind: transport
    channel: matrix
    summary: Matrix partial streaming emits text previews before finalizing
    timeoutMs: 45000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        streaming: partial
