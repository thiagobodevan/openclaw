  surface: channels
  coverage:
    primary:
      - channels.access-and-identity
  objective: "Preserve the retired qa-matrix behavior: Matrix E2EE server-side device deletion
    recovers through re-login and backup restore."
  successCriteria:
    - The QA Lab flow completes matrix-e2ee-server-device-deleted-relogin-recovers through the Matrix adapter with
      the original Matrix-specific assertions.
  docsRefs:
