    channel: matrix
    summary: Matrix E2EE server-side device deletion recovers through re-login and backup restore
    timeoutMs: 180000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-server-device-deleted-relogin-recovers
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE Server Device Relogin Recovery Room
            requireMention: true

flow:
