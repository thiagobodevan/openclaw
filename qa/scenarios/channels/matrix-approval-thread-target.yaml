title: Matrix approval prompt preserves thread targeting metadata
scenario:
  id: matrix-approval-thread-target
  surface: channels
  coverage:
    primary:
      - channels.native-approval-prompts
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 75000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        approvalForwarding:
          exec: true
        dm:
          enabled: true
        execApprovals:
          enabled: true
          target: channel

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-approval.js
  call: runApprovalThreadTargetScenario
  args:
    - expr: "scenarioContext"
