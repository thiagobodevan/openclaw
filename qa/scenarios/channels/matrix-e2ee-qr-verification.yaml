  execution:
    kind: transport
    channel: matrix
    summary: Matrix E2EE QR verification completes identity scan
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        encryption: true
        startupVerification: off
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: true
            key: e2ee-qr-verification
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA E2EE QR Verification Room
            requireMention: true

