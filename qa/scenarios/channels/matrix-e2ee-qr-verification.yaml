  coverage:
    primary:
      - channels.access-and-identity
  objective: "Preserve the retired qa-matrix behavior: Matrix E2EE QR verification completes identity scan."
  successCriteria:
    - The QA Lab Matrix adapter completes matrix-e2ee-qr-verification with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-live-matrix.md
  codeRefs:
