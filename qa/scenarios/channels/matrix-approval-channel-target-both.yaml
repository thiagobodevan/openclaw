title: Matrix approval target=both delivers channel and DM metadata once
scenario:
  id: matrix-approval-channel-target-both
  surface: channels
  coverage:
    primary:
      - channels.native-approval-prompts
  objective: "Preserve the retired qa-matrix behavior: Matrix approval target=both delivers channel
    and DM metadata once."
  successCriteria:
    - The QA Lab flow completes matrix-approval-channel-target-both through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix approval target=both delivers channel and DM metadata once
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        approvalForwarding:
          exec: true
        dm:
          enabled: true
        execApprovals:
          enabled: true
          target: both
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - key: driver-dm
            kind: dm
            members:
              - driver
              - sut
            name: Matrix QA Driver/SUT DM

flow:
  steps:
    - name: Matrix approval target=both delivers channel and DM metadata once
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runApprovalChannelTargetBothScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
