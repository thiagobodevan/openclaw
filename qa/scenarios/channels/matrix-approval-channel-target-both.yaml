title: Matrix approval target=both delivers channel and DM metadata once
scenario:
  id: matrix-approval-channel-target-both
  surface: channels
  coverage:
    primary:
      - channels.native-approval-prompts
  execution:
    kind: flow
    channel: matrix
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        approvalForwarding:
          exec: true
        dm:
          enabled: true
        execApprovals:
          enabled: true
          target: both
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - key: driver-dm
            kind: dm
            members:
              - driver
              - sut
            name: Matrix QA Driver/SUT DM

flow:
  module: ./live-transports/matrix/scenarios/scenario-runtime-approval.js
  call: runApprovalChannelTargetBothScenario
  args:
    - expr: "scenarioContext"
