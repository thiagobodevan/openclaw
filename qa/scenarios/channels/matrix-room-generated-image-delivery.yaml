title: Matrix generated images deliver as real image attachments while streaming
scenario:
  id: matrix-room-generated-image-delivery
  surface: channels
  coverage:
    primary:
      - channels.media-rich-content
  objective: "Preserve the retired qa-matrix behavior: Matrix generated images deliver as real image
    attachments while streaming."
  successCriteria:
    - The QA Lab flow completes matrix-room-generated-image-delivery through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix generated images deliver as real image attachments while streaming
    timeoutMs: 180000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        streaming: quiet
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: media
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Media Room
            requireMention: true

flow:
  steps:
    - name: Matrix generated images deliver as real image attachments while streaming
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runGeneratedImageDeliveryScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
