title: Matrix invite auto-join accepts fresh group rooms
scenario:
  id: matrix-room-autojoin-invite
  surface: channels
  coverage:
    primary:
      - channels.reconnect
  objective: "Preserve the retired qa-matrix behavior: Matrix invite auto-join accepts fresh group rooms."
  successCriteria:
    - The QA Lab flow completes matrix-room-autojoin-invite through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix invite auto-join accepts fresh group rooms
    timeoutMs: 60000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        autoJoin: always
        groupPolicy: open

flow:
  steps:
    - name: Matrix invite auto-join accepts fresh group rooms
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runRoomAutoJoinInviteScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
