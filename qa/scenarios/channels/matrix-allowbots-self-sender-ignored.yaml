title: Matrix allowBots=true still ignores messages from the SUT user id
scenario:
  id: matrix-allowbots-self-sender-ignored
  surface: channels
  coverage:
    primary:
      - channels.access-policy
  objective: "Preserve the retired qa-matrix behavior: Matrix allowBots=true still ignores messages
    from the SUT user id."
  successCriteria:
    - The QA Lab flow completes matrix-allowbots-self-sender-ignored through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix allowBots=true still ignores messages from the SUT user id
    timeoutMs: 8000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        allowBots: true
        groupAllowRoles:
          - driver
          - observer
          - sut
        groupsByKey:
          main:
            requireMention: false

flow:
  steps:
    - name: Matrix allowBots=true still ignores messages from the SUT user id
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runAllowBotsSelfSenderIgnoredScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
