title: Matrix inbound edits cannot turn ignored messages into triggers
scenario:
  id: matrix-inbound-edit-ignored
  surface: channels
  coverage:
    primary:
      - channels.message-actions
  objective: "Preserve the retired qa-matrix behavior: Matrix inbound edits cannot turn ignored
    messages into triggers."
  successCriteria:
    - The QA Lab flow completes matrix-inbound-edit-ignored through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix inbound edits cannot turn ignored messages into triggers
    timeoutMs: 8000
    retryCount: 0
    config:
      requiredChannelDriver: live

flow:
  steps:
    - name: Matrix inbound edits cannot turn ignored messages into triggers
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runInboundEditIgnoredScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
