title: Matrix allowBots=mentions accepts unmentioned configured bot DMs
scenario:
  id: matrix-allowbots-mentions-dm-unmentioned
  surface: channels
  coverage:
    primary:
      - channels.dm
  objective: "Preserve the retired qa-matrix behavior: Matrix allowBots=mentions accepts unmentioned
    configured bot DMs."
  successCriteria:
    - The QA Lab Matrix adapter completes matrix-allowbots-mentions-dm-unmentioned with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-live-matrix.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/scenario-runtime.ts
  execution:
    kind: transport
    channel: matrix
    summary: Matrix allowBots=mentions accepts unmentioned configured bot DMs
    timeoutMs: 45000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        allowBots: mentions
        configuredBotRoles:
          - observer
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - key: bot-dm
            kind: dm
            members:
              - observer
              - sut
            name: Matrix QA Observer/SUT Bot DM

