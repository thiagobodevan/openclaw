title: Matrix allowBots=mentions accepts unmentioned configured bot DMs
scenario:
  id: matrix-allowbots-mentions-dm-unmentioned
  surface: channels
  coverage:
    primary:
      - channels.dm
  objective: "Preserve the retired qa-matrix behavior: Matrix allowBots=mentions accepts unmentioned
    configured bot DMs."
  successCriteria:
    - The QA Lab flow completes matrix-allowbots-mentions-dm-unmentioned through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    summary: Matrix allowBots=mentions accepts unmentioned configured bot DMs
    timeoutMs: 45000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        allowBots: mentions
        configuredBotRoles:
          - observer
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - key: bot-dm
            kind: dm
            members:
              - observer
              - sut
            name: Matrix QA Observer/SUT Bot DM

flow:
  steps:
    - name: Matrix allowBots=mentions accepts unmentioned configured bot DMs
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runAllowBotsMentionsDmUnmentionedScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
