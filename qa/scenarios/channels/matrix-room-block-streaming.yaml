title: Matrix block streaming preserves completed quiet preview blocks
scenario:
  id: matrix-room-block-streaming
  surface: channels
  coverage:
    primary:
      - channels.streaming
  objective: "Preserve the retired qa-matrix behavior: Matrix block streaming preserves completed
    quiet preview blocks."
  successCriteria:
    - The QA Lab flow completes matrix-room-block-streaming through the Matrix adapter with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-e2e-automation.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/matrix-scenario.fixture.ts
  execution:
    kind: flow
    channel: matrix
    providerMode: mock-openai
    summary: Matrix block streaming preserves completed quiet preview blocks
    timeoutMs: 75000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        agentDefaults:
          blockStreamingChunk:
            breakPreference: newline
            maxChars: 48
            minChars: 1
          blockStreamingCoalesce:
            idleMs: 0
            maxChars: 48
            minChars: 1
        blockStreaming: true
        streaming: quiet
        toolProfile: coding
      matrixTopology:
        defaultRoomKey: main
        rooms:
          - encrypted: false
            key: block
            kind: group
            members:
              - driver
              - observer
              - sut
            name: Matrix QA Block Streaming Room
            requireMention: true

flow:
  steps:
    - name: Matrix block streaming preserves completed quiet preview blocks
      actions:
        - set: matrixFixtures
          value:
            expr: "await qaImport('./matrix-scenario.fixture.js')"
        - call: matrixFixtures.runBlockStreamingScenario
          args:
            - expr: "await transport.fixtureApi.getContext()"
          saveAs: result
      detailsExpr: "result.details ?? (result.artifacts ? JSON.stringify(result.artifacts, null, 2) : undefined)"
