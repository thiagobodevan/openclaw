title: Matrix exec approval prompt fallback keeps metadata on the first chunk
scenario:
  id: matrix-approval-exec-metadata-chunked
  surface: channels
  coverage:
    primary:
      - channels.native-approval-prompts
  objective: "Preserve the retired qa-matrix behavior: Matrix exec approval prompt fallback keeps
    metadata on the first chunk."
  successCriteria:
    - The QA Lab Matrix adapter completes matrix-approval-exec-metadata-chunked with the original
      Matrix-specific assertions.
  docsRefs:
    - docs/channels/matrix.md
    - docs/concepts/qa-live-matrix.md
  codeRefs:
    - extensions/qa-lab/src/live-transports/matrix/scenarios/scenario-runtime.ts
  execution:
    kind: transport
    channel: matrix
    summary: Matrix exec approval prompt fallback keeps metadata on the first chunk
    timeoutMs: 90000
    retryCount: 0
    config:
      requiredChannelDriver: live
      matrixConfigOverrides:
        approvalForwarding:
          exec: true
        dm:
          enabled: true
        execApprovals:
          enabled: true
          target: channel
        chunkMode: length
        textChunkLimit: 280

