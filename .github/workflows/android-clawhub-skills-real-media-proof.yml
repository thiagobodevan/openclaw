name: Android ClawHub Skills real media proof

on:
  push:
    branches:
      - evidence/pr-101864-clawhub-media-proof-v4
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or SHA to test
        required: true
        default: evidence/pr-101864-clawhub-media-proof-v4
      expected_pr_head:
        description: Expected PR head SHA for latest-head verification
        required: true
        default: '44a66e0f500c57a0800bdb8d170d7cf0ddfd272a'

concurrency:
  group: android-clawhub-skills-real-media-proof-v4-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android-clawhub-skills-real-media-proof:
    name: Android ClawHub Skills real media proof
    runs-on: ubuntu-24.04
    timeout-minutes: 80
    env:
      ANDROID_AVD_HOME: ${{ github.workspace }}/.android/avd
    steps:
      - name: Checkout target
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
          fetch-depth: 0
          fetch-tags: false
          persist-credentials: false
          submodules: false

      - name: Verify target head
        shell: bash
        env:
          EXPECTED_PR_HEAD_INPUT: ${{ inputs.expected_pr_head }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cp scripts/proof/android-clawhub-skills-real-media-capture.sh /tmp/pr101864-media-capture.sh
          expected_pr_head="${EXPECTED_PR_HEAD_INPUT}"
          if [ -z "${expected_pr_head}" ]; then
            expected_pr_head="$(tr -d '[:space:]' < scripts/proof/pr101864-expected-head.txt)"
          fi
          test -n "${expected_pr_head}"
          github_api_pr_head="$(gh api repos/openclaw/openclaw/pulls/101864 --jq .head.sha)"
          test "${github_api_pr_head}" = "${expected_pr_head}"
          git fetch --no-tags --force https://github.com/snowzlmbot/openclaw.git \
            refs/heads/android-skills-management:refs/remotes/pr101864/head
          git cat-file -e "${expected_pr_head}^{commit}"
          git checkout --detach "${expected_pr_head}"
          build_head="$(git rev-parse HEAD)"
          test "${build_head}" = "${github_api_pr_head}"
          mkdir -p proof-output
          {
            echo "pr_number=101864"
            echo "github_api_pr_head=${github_api_pr_head}"
            echo "expected_pr_head=${expected_pr_head}"
            echo "build_head=${build_head}"
            echo "exact_head_verified=true"
            echo "proof_run=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } > proof-output/latest-head.txt

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: 'false'
          install-deps: 'true'
          save-actions-cache: 'false'

      - name: Build OpenClaw CLI for proof Gateway
        shell: bash
        run: pnpm build:docker

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            apps/android/**/*.gradle*
            apps/android/**/gradle-wrapper.properties
            apps/android/gradle/libs.versions.toml

      - name: Cache Android SDK
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.android-sdk
          key: ${{ runner.os }}-android-clawhub-skills-real-media-proof-v4-api35-platform37-buildtools-36.0.0
          restore-keys: |
            ${{ runner.os }}-android-clawhub-skills-real-media-proof-v4-

      - name: Setup Android SDK
        shell: bash
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="$HOME/.android-sdk"
          CMDLINE_TOOLS_VERSION="14742923"
          ARCHIVE="commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
          URL="https://dl.google.com/android/repository/${ARCHIVE}"
          if [ ! -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
            curl -fsSL "$URL" -o "/tmp/${ARCHIVE}"
            rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
            unzip -q "/tmp/${ARCHIVE}" -d "$ANDROID_SDK_ROOT/cmdline-tools"
            mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          fi
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/emulator" >> "$GITHUB_PATH"

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null || true
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --install \
            "platform-tools" \
            "emulator" \
            "platforms;android-37.0" \
            "build-tools;36.0.0" \
            "system-images;android-35;google_apis;x86_64"

      - name: Create proof AVD
        shell: bash
        env:
          AVD_NAME: OpenClaw_ClawHub_Skills_API35
        run: |
          set -euo pipefail
          mkdir -p "$ANDROID_AVD_HOME"
          echo "no" | avdmanager create avd \
            --force \
            --name "$AVD_NAME" \
            --package "system-images;android-35;google_apis;x86_64" \
            --device "pixel_6"

      - name: Enable KVM access
        shell: bash
        run: |
          set -euo pipefail
          if [ -e /dev/kvm ]; then
            sudo sh -c 'echo KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm" > /etc/udev/rules.d/99-kvm4all.rules'
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm || true
            sudo chmod a+rw /dev/kvm
            ls -l /dev/kvm
          fi

      - name: Build debug APK
        working-directory: apps/android
        shell: bash
        run: ./gradlew --no-daemon --build-cache :app:assemblePlayDebug

      - name: Install media metadata tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes ffmpeg
          ffprobe -version | head -1

      - name: Capture real Android ClawHub Skills media
        shell: bash
        env:
          AVD_NAME: OpenClaw_ClawHub_Skills_API35
        run: bash /tmp/pr101864-media-capture.sh

      - name: Summarize proof
        shell: bash
        env:
          TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}
          EXPECTED_PR_HEAD: ${{ inputs.expected_pr_head }}
        run: |
          set -euo pipefail
          {
            echo "## Android ClawHub Skills real media proof"
            echo
            echo "- Target ref: \`${TARGET_REF}\`"
            echo "- Commit: \`$(git rev-parse HEAD)\`"
            if [ -n "${EXPECTED_PR_HEAD}" ]; then
              echo "- Expected PR head: \`${EXPECTED_PR_HEAD}\`"
            fi
            echo "- Capture source: GitHub-hosted ubuntu-24.04 runner + Android emulator API 35"
            echo "- App artifact: \`$(cat proof-output/apk-path.txt)\`"
            echo "- Gateway proof: temporary OpenClaw Gateway started from this checkout; Android connects through the normal launcher, Settings → Skills, then performs real Gateway \`skills.search\`, \`skills.detail\`, and \`skills.install\` RPCs."
            echo "- ClawHub data source: deterministic local ClawHub-compatible HTTP fixture served inside the same Actions run; media is a real emulator capture, not screenshot-mode/static mock."
            echo "- Screenshot mode: false"
            echo
            echo "### Captured media and logs"
            find proof-output -maxdepth 1 -type f -printf '- \`%f\`\n' | sort
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: android-clawhub-skills-real-media-proof-v4
          path: |
            proof-output/latest-head.txt
            proof-output/README.md
            proof-output/artifact-manifest.txt
            proof-output/proof-media-sha256.txt
            proof-output/proof-media-metadata.json
            proof-output/fixture-events.json
            proof-output/gateway-proof-summary.json
            proof-output/fixture-startup.txt
            proof-output/gateway-skills-*.err
            proof-output/device-pair-list.json
            proof-output/device-pair-list.err
            proof-output/device-pair-approve-*.json
            proof-output/device-pair-approve-*.err
            proof-output/capture.log
            proof-output/clawhub-fixture.jsonl
            proof-output/*-download-count.txt
            proof-output/malicious-gateway-install.json
            proof-output/malicious-gateway-install.err
            proof-output/*-ui.xml
            proof-output/*.png
            proof-output/*.mp4
          if-no-files-found: error
          retention-days: 14
